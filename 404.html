<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ASK & BAALAM</title>
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var targetPath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
          .replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      
      sessionStorage.redirect = targetPath;
      
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/');
    </script>
  </head>
  <body>
  </body>
</html>
